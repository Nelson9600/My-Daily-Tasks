<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="100" fill="#080810"/>
  <rect x="40" y="40" width="432" height="432" rx="80" fill="#0f0f1a"/>
  <!-- Accent glow circle -->
  <circle cx="256" cy="200" r="180" fill="url(#glow)" opacity="0.15"/>
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7c6aff"/>
      <stop offset="100%" stop-color="#080810" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bar1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7c6aff"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <linearGradient id="bar3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#f472b6"/>
    </linearGradient>
    <linearGradient id="bar4" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
  </defs>
  <!-- Clock icon top -->
  <circle cx="256" cy="148" r="72" fill="none" stroke="#7c6aff" stroke-width="10" opacity="0.6"/>
  <line x1="256" y1="148" x2="256" y2="108" stroke="#a78bfa" stroke-width="10" stroke-linecap="round"/>
  <line x1="256" y1="148" x2="286" y2="164" stroke="#7c6aff" stroke-width="10" stroke-linecap="round"/>
  <circle cx="256" cy="148" r="8" fill="#a78bfa"/>
  <!-- Task bars -->
  <rect x="80" y="268" width="352" height="22" rx="11" fill="rgba(255,255,255,0.05)"/>
  <rect x="80" y="268" width="300" height="22" rx="11" fill="url(#bar1)"/>
  <rect x="80" y="308" width="352" height="22" rx="11" fill="rgba(255,255,255,0.05)"/>
  <rect x="80" y="308" width="220" height="22" rx="11" fill="url(#bar2)"/>
  <rect x="80" y="348" width="352" height="22" rx="11" fill="rgba(255,255,255,0.05)"/>
  <rect x="80" y="348" width="260" height="22" rx="11" fill="url(#bar3)"/>
  <rect x="80" y="388" width="352" height="22" rx="11" fill="rgba(255,255,255,0.05)"/>
  <rect x="80" y="388" width="180" height="22" rx="11" fill="url(#bar4)"/>
  <!-- Check dots -->
  <circle cx="448" cy="279" r="11" fill="#7c6aff"/>
  <polyline points="442,279 447,285 455,273" fill="none" stroke="#fff" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="448" cy="319" r="11" fill="#10b981"/>
  <polyline points="442,319 447,325 455,313" fill="none" stroke="#fff" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
